<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rex Anime News</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            background: #000;
            color: #f5f5f7;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            padding: 60px 20px;
        }
        header{
            text-align: center;
            margin-bottom: 60px;
        }
        h1{
            font-size: 56px;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }
        h2{
            font-size: 30px;
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }
        .subtitle{
            font-size: 19px;
            color: #a1a1a6;
            font-weight: 400;
        }
        #output{
            display: grid;
            grid-template-columns: repeat(auto-fit, minimax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card{
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border : 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 24px;
            transition: transform 0.3s ease;
        }
        .card:hover{
            transform: translateY(-5px);
        }
        .card img{
            width: 100%;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .card h3{
            font-size:19px;
            font-weight:600;
            margin-bottom:8px;
        }
        .card p{
            font-size:14px;
            color:#a1a1a6;
            line-height:1.5;
            display:-webkit-box;
            -webkit-line-clamp:3;
            -webkit-box-orient:vertical;
            overflow:hidden;
        }
        .search-box input{
            width:300px;
            padding:12px 18px;
            font-size:16px;
            background:rgba(255,255,255,0.05);
            border :1px solid rgba(255,255,255,0.1);
            border-radius  :10px;
            color:#f5f5f7;
            outline:none;
        }
        .search-box button{
            padding :12px 24px;
            font-size  :16px;
            background:#0a84ff;
            color: white;
            border:none;
            border-radius :10px;
            cursor:pointer;
        }
        .search-box{
            position:sticky;
            top:20px;
            z-index:20 ;
            display:flex;
            justify-content:center ;
            gap:10px ;
            margin-bottom:40px;
            background:#000;
            padding:10px 0;
        }
        #suggestions{
            position:absolute;
            top:100%;
            left:0;
            width:300px;
            background:#1a1a1a;
            border:1px solid rgba(255, 255, 255,0.1);
            border-radius:10px;
            max-height:250px;
            overflow-y:auto;
            z-index:10;
        }
        #suggestions div{
            padding:10px 15px;
            cursor:pointer;
            border-bottom:1px solid rgba(255,255,255,0.05);
            }
            #suggestions div:hover{
                background:rgba(255,255,255,0.08);
            }
    </style>
</head>
<body>
    <header>
        <h1>Rex Anime News</h1>
        <h2>Now Airing</h2>
        <p class="subtitle">This season's anime, updated live 🟢</p>
    </header>

    
    
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search Anime....."/>
        <button id="searchBtn">🔍</button>
        <div id="suggestions"></div>
    </div>
    
    <div id="output"></div>
    <script src="main.js"></script>
</body>
</html>
